version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: advanced_pg
      DB_USERNAME: pguser
      DB_PASSWORD: pgpass
      PGBOUNCER_HOST: pgbouncer
      PGBOUNCER_PORT: 5432
    depends_on:
      - postgres
      - pgbouncer
    command: php -S 0.0.0.0:8000 -t public

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: advanced_pg
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init-db.sql:/docker-entrypoint-initdb.d/init.sql

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://pguser:pgpass@postgres:5432/advanced_pg
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6433:5432"
    depends_on:
      - postgres

volumes:
  postgres_data:
