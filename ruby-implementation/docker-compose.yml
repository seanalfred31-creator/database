version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://pguser:pgpass@postgres:5432/advanced_pg
      PGBOUNCER_URL: postgresql://pguser:pgpass@pgbouncer:5432/advanced_pg
      RAILS_ENV: development
    depends_on:
      - postgres
      - pgbouncer
    command: bundle exec rails server -b 0.0.0.0

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: advanced_pg
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../init-db.sql:/docker-entrypoint-initdb.d/init.sql

  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgres://pguser:pgpass@postgres:5432/advanced_pg
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6434:5432"
    depends_on:
      - postgres

volumes:
  postgres_data:
